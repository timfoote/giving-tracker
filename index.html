<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim & Cait — Giving Tracker</title>
  <link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-title" content="Giving">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --cream: #F7F4EE;
    --ink: #1C1917;
    --ink-soft: #57534E;
    --ink-muted: #A8A29E;
    --sage: #4A7C6F;
    --sage-light: #E6F0EE;
    --gold: #B45309;
    --gold-light: #FEF3C7;
    --rose: #9F3E55;
    --rose-light: #FCE7EE;
    --slate: #3B5577;
    --slate-light: #E4ECF5;
    --border: #E2DDD6;
    --radius: 10px;
    --font-serif: 'DM Serif Display', Georgia, serif;
    --font-sans: 'DM Sans', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  .site-header {
    background: var(--ink);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .site-title {
    font-family: var(--font-serif);
    font-size: 1.25rem;
    color: var(--cream);
    letter-spacing: 0.01em;
  }
  .site-subtitle { font-size: 12px; color: var(--ink-muted); margin-top: 1px; }
  .header-leaf { font-size: 1.6rem; line-height: 1; }

  .container { max-width: 560px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  .sync-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--ink-muted);
    margin-bottom: 1rem;
  }
  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ink-muted);
    flex-shrink: 0;
  }
  .sync-dot.connected { background: var(--sage); }
  .sync-dot.error { background: var(--rose); }

  .totals {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .total-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.875rem 1rem;
  }
  .total-label {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--ink-muted); margin-bottom: 5px;
  }
  .total-value {
    font-family: var(--font-serif);
    font-size: 1.5rem; color: var(--ink); line-height: 1;
  }

  .log-btn {
    width: 100%; background: var(--sage); color: white;
    border: none; border-radius: var(--radius);
    padding: 0.875rem; font-family: var(--font-sans);
    font-size: 15px; font-weight: 600; cursor: pointer;
    margin-bottom: 1rem; letter-spacing: 0.01em;
    transition: background 0.15s;
  }
  .log-btn:hover { background: #3d6b5f; }

  .form-card {
    background: white; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.25rem;
    margin-bottom: 1.25rem; display: none;
  }
  .form-card.open { display: block; }
  .form-title { font-family: var(--font-serif); font-size: 1.1rem; margin-bottom: 1rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-field { display: flex; flex-direction: column; gap: 4px; }
  .form-field.full { grid-column: 1 / -1; }

  label {
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-soft);
  }
  input, select, textarea {
    font-family: var(--font-sans); font-size: 15px;
    color: var(--ink); background: var(--cream);
    border: 1px solid var(--border); border-radius: 7px;
    padding: 8px 10px; outline: none;
    transition: border-color 0.15s; width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--sage); background: white;
  }
  textarea { resize: vertical; min-height: 64px; }

  .form-actions { display: flex; gap: 8px; margin-top: 14px; }
  .btn-save {
    flex: 1; background: var(--sage); color: white;
    border: none; border-radius: 7px; padding: 10px;
    font-family: var(--font-sans); font-size: 15px;
    font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  .btn-save:hover { background: #3d6b5f; }
  .btn-save:disabled { background: var(--ink-muted); cursor: not-allowed; }
  .btn-cancel {
    padding: 10px 18px; border: 1px solid var(--border);
    border-radius: 7px; background: none;
    font-family: var(--font-sans); font-size: 15px;
    color: var(--ink-soft); cursor: pointer;
  }

  .cat-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .pill {
    padding: 5px 12px; border-radius: 20px; font-size: 12px;
    font-weight: 600; border: 1.5px solid var(--border);
    background: none; color: var(--ink-soft); cursor: pointer;
    transition: all 0.12s; font-family: var(--font-sans);
  }
  .pill:hover { border-color: var(--ink-soft); color: var(--ink); }
  .pill.active-all      { background: var(--ink); color: white; border-color: var(--ink); }
  .pill.active-kind     { background: var(--sage-light); color: var(--sage); border-color: var(--sage); }
  .pill.active-charity  { background: var(--slate-light); color: var(--slate); border-color: var(--slate); }
  .pill.active-friendfam { background: var(--gold-light); color: var(--gold); border-color: var(--gold); }
  .pill.active-other    { background: var(--rose-light); color: var(--rose); border-color: var(--rose); }

  .section-label {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--ink-muted); margin-bottom: 8px;
  }

  .entries { display: flex; flex-direction: column; gap: 8px; }

  .entry {
    background: white; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem 1.1rem;
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 12px;
  }
  .entry-left { flex: 1; min-width: 0; }
  .entry-name {
    font-size: 15px; font-weight: 600; color: var(--ink);
    margin-bottom: 4px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .entry-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .cat-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .badge-kind       { background: var(--sage-light);  color: var(--sage); }
  .badge-charity    { background: var(--slate-light); color: var(--slate); }
  .badge-friendfam  { background: var(--gold-light);  color: var(--gold); }
  .badge-other      { background: var(--rose-light);  color: var(--rose); }

  .entry-date { font-size: 12px; color: var(--ink-muted); }
  .entry-who  { font-size: 12px; color: var(--ink-muted); }
  .entry-note { font-size: 13px; color: var(--ink-soft); margin-top: 5px; line-height: 1.4; }

  .entry-right { text-align: right; flex-shrink: 0; }
  .entry-amount {
    font-family: var(--font-serif); font-size: 1.2rem;
    color: var(--sage); white-space: nowrap;
  }
  .entry-delete {
    font-size: 12px; color: var(--ink-muted);
    background: none; border: none; cursor: pointer;
    margin-top: 6px; display: block; padding: 0;
    font-family: var(--font-sans);
  }
  .entry-delete:hover { color: var(--rose); }

  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--ink-muted); }
  .empty-icon { font-size: 2rem; margin-bottom: 8px; }
  .empty-text { font-size: 14px; }

  .loading { text-align: center; padding: 2rem; color: var(--ink-muted); font-size: 14px; }

  .toast {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%);
    background: var(--ink); color: white;
    padding: 10px 20px; border-radius: 8px;
    font-size: 14px; opacity: 0; pointer-events: none;
    transition: opacity 0.2s; z-index: 100; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 400px) {
    .form-grid { grid-template-columns: 1fr; }
    .total-value { font-size: 1.25rem; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="site-title">Tim &amp; Cait</div>
    <div class="site-subtitle">Giving Tracker</div>
  </div>
  <div class="header-leaf" aria-hidden="true">🌿</div>
</header>

<main class="container">

  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">Connecting…</span>
  </div>

  <div class="totals">
    <div class="total-card">
      <div class="total-label">All time</div>
      <div class="total-value" id="total-all">$0</div>
    </div>
    <div class="total-card">
      <div class="total-label">This year</div>
      <div class="total-value" id="total-year">$0</div>
    </div>
    <div class="total-card">
      <div class="total-label">Entries</div>
      <div class="total-value" id="total-count">0</div>
    </div>
  </div>

  <button class="log-btn" onclick="toggleForm()">＋ Log a gift</button>

  <div class="form-card" id="form-card">
    <div class="form-title">New entry</div>
    <div class="form-grid">
      <div class="form-field">
        <label for="f-name">Recipient / cause</label>
        <input type="text" id="f-name" placeholder="e.g. Food pantry" autocomplete="off" />
      </div>
      <div class="form-field">
        <label for="f-amount">Amount ($)</label>
        <input type="number" id="f-amount" placeholder="0.00" min="0" step="0.01" />
      </div>
      <div class="form-field">
        <label for="f-cat">Category</label>
        <select id="f-cat">
          <option value="kind">Act of Kindness</option>
          <option value="charity">Charity Org</option>
          <option value="friendfam">Friend &amp; Fam</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-field">
        <label for="f-who">Logged by</label>
        <select id="f-who">
          <option value="Tim">Tim</option>
          <option value="Cait">Cait</option>
        </select>
      </div>
      <div class="form-field full">
        <label for="f-note">Note (optional)</label>
        <textarea id="f-note" placeholder="Any context about this gift…"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-save" id="save-btn" onclick="saveEntry()">Save entry</button>
      <button class="btn-cancel" onclick="toggleForm()">Cancel</button>
    </div>
  </div>

  <div class="cat-pills">
    <button class="pill active-all" onclick="setFilter('all', this)">All</button>
    <button class="pill" onclick="setFilter('kind', this)">Act of Kindness</button>
    <button class="pill" onclick="setFilter('charity', this)">Charity Org</button>
    <button class="pill" onclick="setFilter('friendfam', this)">Friend &amp; Fam</button>
    <button class="pill" onclick="setFilter('other', this)">Other</button>
  </div>

  <div class="section-label">Recent giving</div>
  <div class="entries" id="entries-list">
    <div class="loading">Loading…</div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, deleteDoc,
    doc, onSnapshot, query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBDfpIRsekn_gTByA-I87ya7u9i7z77feo",
    authDomain: "giving-tracker-cc762.firebaseapp.com",
    projectId: "giving-tracker-cc762",
    storageBucket: "giving-tracker-cc762.firebasestorage.app",
    messagingSenderId: "899648356153",
    appId: "1:899648356153:web:25cf2a69c2a5ec3d12f2e8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const entriesCol = collection(db, "entries");

  const catLabel = { kind: 'Act of Kindness', charity: 'Charity Org', friendfam: 'Friend & Fam', other: 'Other' };
  const catBadge = { kind: 'badge-kind', charity: 'badge-charity', friendfam: 'badge-friendfam', other: 'badge-other' };
  const pillActive = { all: 'active-all', kind: 'active-kind', charity: 'active-charity', friendfam: 'active-friendfam', other: 'active-other' };

  let entries = [];
  let activeFilter = 'all';

  const q = query(entriesCol, orderBy("createdAt", "desc"));
  onSnapshot(q,
    (snapshot) => {
      entries = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      setSyncStatus('connected');
      render();
    },
    (err) => {
      console.error(err);
      setSyncStatus('error');
    }
  );

  function setSyncStatus(state) {
    const dot = document.getElementById('sync-dot');
    const label = document.getElementById('sync-label');
    dot.className = 'sync-dot ' + state;
    label.textContent = state === 'connected' ? 'Synced' : state === 'error' ? 'Connection error' : 'Connecting…';
  }

  window.toggleForm = function() {
    const card = document.getElementById('form-card');
    card.classList.toggle('open');
    if (card.classList.contains('open')) {
      setTimeout(() => document.getElementById('f-name').focus(), 50);
    }
  };

  window.setFilter = function(val, el) {
    activeFilter = val;
    document.querySelectorAll('.pill').forEach(p => p.className = 'pill');
    el.className = 'pill ' + pillActive[val];
    render();
  };

  window.saveEntry = async function() {
    const name = document.getElementById('f-name').value.trim();
    const amount = parseFloat(document.getElementById('f-amount').value) || 0;
    const cat = document.getElementById('f-cat').value;
    const who = document.getElementById('f-who').value;
    const note = document.getElementById('f-note').value.trim();

    if (!name) {
      showToast('Add a recipient or cause first');
      document.getElementById('f-name').focus();
      return;
    }

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      await addDoc(entriesCol, { name, amount, cat, who, note, createdAt: serverTimestamp() });
      document.getElementById('f-name').value = '';
      document.getElementById('f-amount').value = '';
      document.getElementById('f-note').value = '';
      document.getElementById('form-card').classList.remove('open');
      showToast('Entry saved ✓');
    } catch(e) {
      showToast('Error saving — check connection');
      console.error(e);
    }

    btn.disabled = false;
    btn.textContent = 'Save entry';
  };

  window.deleteEntry = async function(id) {
    try {
      await deleteDoc(doc(db, "entries", id));
      showToast('Entry removed');
    } catch(e) {
      showToast('Error removing entry');
    }
  };

  function render() {
    const year = new Date().getFullYear();
    const total = entries.reduce((s, e) => s + (e.amount || 0), 0);
    const yearTotal = entries
      .filter(e => e.createdAt && e.createdAt.toDate && e.createdAt.toDate().getFullYear() === year)
      .reduce((s, e) => s + (e.amount || 0), 0);

    document.getElementById('total-all').textContent   = '$' + fmt(total);
    document.getElementById('total-year').textContent  = '$' + fmt(yearTotal);
    document.getElementById('total-count').textContent = entries.length;

    const filtered = activeFilter === 'all' ? entries : entries.filter(e => e.cat === activeFilter);
    const list = document.getElementById('entries-list');

    if (!filtered.length) {
      list.innerHTML = `<div class="empty">
        <div class="empty-icon">🌱</div>
        <div class="empty-text">${entries.length === 0 ? 'Your first entry is just a tap away.' : 'No entries in this category yet.'}</div>
      </div>`;
      return;
    }

    list.innerHTML = filtered.map(e => {
      const d = e.createdAt ? e.createdAt.toDate() : new Date();
      const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      return `<div class="entry">
        <div class="entry-left">
          <div class="entry-name">${esc(e.name)}</div>
          <div class="entry-meta">
            <span class="cat-badge ${catBadge[e.cat] || 'badge-other'}">${catLabel[e.cat] || 'Other'}</span>
            <span class="entry-date">${dateStr}</span>
            <span class="entry-who">· ${esc(e.who)}</span>
          </div>
          ${e.note ? `<div class="entry-note">${esc(e.note)}</div>` : ''}
        </div>
        <div class="entry-right">
          ${e.amount ? `<div class="entry-amount">$${fmtFull(e.amount)}</div>` : '<div class="entry-amount" style="color:var(--ink-muted)">—</div>'}
          <button class="entry-delete" onclick="deleteEntry('${e.id}')">remove</button>
        </div>
      </div>`;
    }).join('');
  }

  function fmt(n) {
    return n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }
  function fmtFull(n) {
    return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  let toastTimer;
  window.showToast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  };
</script>
</body>
</html>
